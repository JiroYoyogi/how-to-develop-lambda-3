<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>いいね！</title>
    <style>
      body {
        line-height: 1.8;
        max-width: 720px;
        margin: 40px auto;
        font-family: sans-serif;
      }

      h1 {
        font-size: 28px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 12px;
      }

      .like-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 24px;
        padding: 10px 16px;
        border: 1px solid #ddd;
        border-radius: 999px;
        background: #fff;
        cursor: pointer;
        transition: background 0.2s;
      }

      .like-button:hover {
        background: #f7f7f7;
      }

      .like-button svg {
        width: 20px;
        height: 20px;
        fill: #e0245e;
      }

      .like-count {
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <article>
      <h1>タイトルタイトルタイトル</h1>

      <p>テキストテキストテキストテキストテキストテキストテキストテキストテキスト</p>
      <p>テキストテキストテキストテキストテキストテキストテキストテキストテキスト</p>
      <p>テキストテキストテキストテキストテキストテキストテキストテキストテキスト</p>

      <button id="js-like-button" class="like-button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
               2 5.42 4.42 3 7.5 3
               c1.74 0 3.41 0.81 4.5 2.09
               C13.09 3.81 14.76 3 16.5 3
               19.58 3 22 5.42 22 8.5
               c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
          />
        </svg>
        <span class="like-count">いいね！ <span id="js-like-count">0</span></span>
      </button>
    </article>

    <script>
      const btnLike = document.getElementById("js-like-button");
      const countLike = document.getElementById("js-like-count");

      btnLike.addEventListener("click", async () => {
        countLike.innerText = Number(countLike.innerText) + 1;
      });
    </script>
  </body>
</html>
